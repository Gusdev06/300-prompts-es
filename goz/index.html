<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>goz.ai</title>
  <link rel="alternate" hreflang="en" href="/en/" />
  <link rel="alternate" hreflang="es" href="/es/" />
  <link rel="alternate" hreflang="pt-BR" href="/pt-br/" />
  <link rel="alternate" hreflang="x-default" href="/en/" />
  <style>
    html, body { background:#0A0A0A; color:#fafafa; height:100%; margin:0; font-family: system-ui, sans-serif; }
    .wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:14px; }
    .pulse { width:42px; height:42px; border-radius:8px; background:#D4FF00; animation:p 1s ease-in-out infinite }
    @keyframes p { 0%,100%{transform:scale(1)} 50%{transform:scale(0.85)} }
    .opts { display:flex; gap:14px; margin-top:8px }
    .opts a { padding:8px 14px; border-radius:8px; border:1px solid rgba(255,255,255,0.15); color:#fafafa; text-decoration:none; font-size:.9rem }
    .opts a:hover { border-color:#D4FF00; color:#D4FF00 }
    p { color:rgba(255,255,255,0.6); font-size:.85rem }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="pulse"></div>
    <p>Redirecting to goz.ai…</p>
    <noscript>
      <div class="opts">
        <a href="/en/">English</a>
        <a href="/es/">Español</a>
        <a href="/pt-br/">Português</a>
      </div>
    </noscript>
  </div>
  <script>
    (function () {
      const supported = { en: 1, es: 1, 'pt-br': 1 };
      // 1. ?lang= override
      const qs = new URLSearchParams(location.search);
      const forced = (qs.get('lang') || '').toLowerCase();
      if (supported[forced]) return location.replace('/' + forced + '/');
      // 2. localStorage preference
      let pref = '';
      try { pref = (localStorage.getItem('goz_lang') || '').toLowerCase(); } catch (e) {}
      if (supported[pref]) return location.replace('/' + pref + '/');
      // 3. browser language
      const navLang = ((navigator.language || (navigator.languages && navigator.languages[0]) || '') + '').toLowerCase();
      let target = 'en';
      if (navLang.startsWith('pt')) target = 'pt-br';
      else if (navLang.startsWith('es')) target = 'es';
      else if (navLang.startsWith('en')) target = 'en';
      try { localStorage.setItem('goz_lang', target); } catch (e) {}
      location.replace('/' + target + '/');
    })();
  </script>
</body>

</html>
